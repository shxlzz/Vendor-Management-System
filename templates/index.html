<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vendor Management System</h1>
            <button class="btn btn-primary" onclick="openAddVendorModal()">+ Add New Vendor</button>
        </header>

        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="Search by vendor name, email, phone, or company..." onkeyup="searchVendors()">
            <select id="filterSelect" onchange="filterVendors()">
                <option value="">All Vendors</option>
                <option value="active">Active</option>
            </select>
        </div>

        <div class="vendors-container">
            <div id="vendorsList" class="vendors-grid"></div>
        </div>
    </div>

    <div id="vendorModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVendorModal()">&times;</span>
            <h2 id="modalTitle">Add New Vendor</h2>
            <form id="vendorForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="vendor_name">Vendor Name *</label>
                        <input type="text" id="vendor_name" name="vendor_name" required>
                        <span class="error-message" id="vendor_name-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="contact_person">Contact Person *</label>
                        <input type="text" id="contact_person" name="contact_person" required>
                        <span class="error-message" id="contact_person-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error-message" id="email-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone *</label>
                        <input type="tel" id="phone" name="phone" placeholder="10+ digits" required>
                        <span class="error-message" id="phone-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <input type="text" id="address" name="address" required>
                        <span class="error-message" id="address-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" required>
                        <span class="error-message" id="city-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="state">State *</label>
                        <input type="text" id="state" name="state" required>
                        <span class="error-message" id="state-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="pincode">Pincode *</label>
                        <input type="text" id="pincode" name="pincode" placeholder="6 digits" required>
                        <span class="error-message" id="pincode-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="company_name">Company Name *</label>
                        <input type="text" id="company_name" name="company_name" required>
                        <span class="error-message" id="company_name-error"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gst_number">GST Number</label>
                        <input type="text" id="gst_number" name="gst_number">
                    </div>
                    <div class="form-group">
                        <label for="payment_terms">Payment Terms</label>
                        <input type="text" id="payment_terms" name="payment_terms" placeholder="e.g., Net 30">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Vendor</button>
                    <button type="button" class="btn btn-secondary" onclick="closeVendorModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
